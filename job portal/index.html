<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Job Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Job Portal</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Jobs</a>
            <a href="#">Companies</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Search Section -->
    <section class="search">
        <h2>Find Your Dream Job</h2>
        <input type="text" placeholder="Job title or keyword">
        <input type="text" placeholder="Location">
        <button>Search</button>
    </section>

    <!-- Job Listings -->
    <section class="jobs">
        <h2>Latest Jobs</h2>

        <div class="job-card">
            <h3>Frontend Developer</h3>
            <p>Company: ABC Tech</p>
            <p>Location: Bangalore</p>
            <button>Apply</button>
        </div>

        <div class="job-card">
            <h3>Backend Developer</h3>
            <p>Company: XYZ Solutions</p>
            <p>Location: Delhi</p>
            <button>Apply</button>
        </div>

        <div class="job-card">
            <h3>UI/UX Designer</h3>
            <p>Company: DesignPro</p>
            <p>Location: Mumbai</p>
            <button>Apply</button>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Simple Job Portal</p>
    </footer>

</body>
</html>
